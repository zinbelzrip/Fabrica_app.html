<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Fábrica App</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:#1e3c72;padding:16px}
        .app{max-width:1200px;margin:0 auto;background:white;border-radius:24px;overflow:hidden}
        .header{background:#2a5298;color:white;padding:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
        .logo h1{font-size:1.3rem}
        .logo p{font-size:0.7rem;opacity:0.9}
        .logout-btn{background:rgba(255,255,255,0.2);border:none;padding:6px 12px;border-radius:20px;color:white;cursor:pointer}
        .tabs{display:flex;background:#f8f9fa;border-bottom:2px solid #e9ecef;flex-wrap:wrap}
        .tab{flex:1;padding:12px;background:none;border:none;cursor:pointer;font-weight:600;color:#6c757d;font-size:0.8rem}
        .tab.active{background:white;color:#2a5298;border-bottom:3px solid #2a5298}
        .panel{display:none;padding:16px}
        .panel.active{display:block}
        .sub-tabs{display:flex;gap:8px;margin-bottom:16px;border-bottom:1px solid #dee2e6;padding-bottom:8px}
        .sub-tab{background:#e9ecef;border:none;padding:8px 16px;border-radius:20px;cursor:pointer;font-size:0.8rem;width:auto}
        .sub-tab.active{background:#2a5298;color:white}
        .meses{display:flex;flex-wrap:wrap;justify-content:center;gap:4px;margin-bottom:16px}
        .mes-btn{background:#2d5a2c;color:white;border:none;padding:4px 8px;border-radius:16px;cursor:pointer;font-size:0.65rem;font-weight:500}
        .mes-btn.activo{background:#c41e3a}
        table{width:100%;border-collapse:collapse}
        th{background:#2d5a2c;color:white;padding:10px 5px;border:1px solid #4a7a4a}
        td{border:1px solid #c4a27a;text-align:center;padding:12px 4px;cursor:pointer}
        .num{font-size:1.2rem;font-weight:bold;display:block}
        .nota-icon{font-size:0.7rem;margin-top:4px}
        .fondo-blanco{background:white}
        .fondo-gris{background:#d3d3d3}
        .fondo-naranja{background:#ffd966}
        .fondo-amarillo{background:#fff2b5}
        .fondo-azul-claro{background:#b8e1fc}
        .negro{color:black}
        .rojo{color:#c41e3a}
        .verde{color:#2d8c2d}
        .panel-notas{margin-top:16px;padding:12px;background:#f5f5dc;border-radius:12px}
        .panel-notas textarea{width:100%;padding:8px;border:1px solid #c4a27a;border-radius:8px;margin-top:8px;font-family:inherit}
        .btn{background:#2d5a2c;color:white;border:none;padding:8px;border-radius:20px;cursor:pointer;margin-top:8px;width:100%}
        .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
        .stat-card{background:#2a5298;color:white;padding:16px;border-radius:12px;text-align:center}
        .chat{height:400px;display:flex;flex-direction:column;border:1px solid #dee2e6;border-radius:12px;overflow:hidden}
        .chat-msgs{flex:1;overflow-y:auto;padding:12px;background:#f8f9fa}
        .msg{margin-bottom:10px;display:flex;flex-direction:column}
        .msg.envio{align-items:flex-end}
        .msg.recibe{align-items:flex-start}
        .bubble{max-width:70%;padding:8px 12px;border-radius:16px}
        .envio .bubble{background:#2a5298;color:white}
        .recibe .bubble{background:white;border:1px solid #dee2e6}
        .chat-input{display:flex;padding:8px;gap:8px;background:white}
        .chat-input input{flex:1;padding:8px;border:1px solid #dee2e6;border-radius:20px}
        .chat-input button{width:auto;padding:8px 16px;background:#2a5298;color:white;border:none;border-radius:20px;cursor:pointer}
        .users{display:flex;flex-direction:column;gap:8px}
        .user-item{display:flex;justify-content:space-between;align-items:center;padding:12px;background:#f8f9fa;border-radius:10px;cursor:pointer}
        .modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);display:flex;justify-content:center;align-items:center;z-index:1000}
        .modal-content{background:white;padding:24px;border-radius:20px;max-width:350px;width:90%}
        .form-group{margin-bottom:12px}
        .form-group label{display:block;margin-bottom:4px;font-weight:600}
        .form-group input{width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;font-size:16px}
        .password-container{position:relative;display:flex;align-items:center}

        .toggle-password{position:absolute;right:10px;cursor:pointer;font-size:20px;user-select:none}
        .error{color:red;font-size:0.75rem;text-align:center;margin-top:8px}
        .toast{position:fixed;bottom:20px;right:20px;background:#333;color:white;padding:10px 16px;border-radius:8px;z-index:2000}
        button{background:#2a5298;color:white;border:none;padding:10px;border-radius:8px;cursor:pointer;width:100%}
        .btn-sec{background:#6c757d;margin-top:8px}

    </style>
</head>

    </div>

</div>

<!-- Modal de Login con ojo en contraseñas -->

function togglePassword(inputId, element) {
    var input = document.getElementById(inputId);
    if (input.type === "password") {
        input.type = "text";
        element.textContent = "🙈";
    } else {
        input.type = "password";
        element.textContent = "👁️";
    }
}

function esCumpleaños(texto) {
    if (!texto) return false;
    var lower = texto.toLowerCase();
    return lower.indexOf('cumpleaños') !== -1 || lower.indexOf('cumple') !== -1;
}

var mesActual = 0;
var diaSel = null;

function getColorNum(mes, dia, esFinSem) {
    if (mes === 4 && dia === 1) return 'verde';
    if (esFinSem) return 'negro';
    var sem = semanaDia[mes + '-' + dia] || 1;
    return coloresSemana[sem] || 'negro';
}

function generarCalendario(mes) {
    var dias = mesesDias[mes];
    var inicio = mesesInicio[mes];
    var html = '';
    var fila = '<tr>';
    for (var i = 0; i < inicio; i++) fila += '<td style="background:#e8e0c8"></td>';
    for (var d = 1; d <= dias; d++) {
        var fecha = new Date(2026, mes, d);
        var diaSem = fecha.getDay();
        var esFinSem = (diaSem === 0 || diaSem === 6);
        var color = getColorNum(mes, d, esFinSem);
        
        var fondo = '';
        var key = mes + '-' + d;
        if (fondosAzulClaro[key]) {
            fondo = 'fondo-azul-claro';
        } else if (fondosAmarillos[key]) {
            fondo = 'fondo-amarillo';
        } else if (fondosNaranja[key]) {
            fondo = 'fondo-naranja';
        } else if (esFinSem) {
            fondo = 'fondo-gris';
        } else {
            fondo = 'fondo-blanco';
        }
        
        var claseNum = color === 'rojo' ? 'rojo' : (color === 'verde' ? 'verde' : 'negro');
        var notaKey = d + '/' + (mes+1);
        var notaIcon = notas[notaKey] ? '<span class="nota-icon">📝</span>' : '';
        fila += '<td class="' + fondo + '" onclick="seleccionarDia(' + mes + ',' + d + ')"><span class="num ' + claseNum + '">' + d + '</span>' + notaIcon + '</td>';
        if ((inicio + d) % 7 === 0) { html += fila + '</tr>'; fila = '<tr>'; }
    }
    if (fila !== '<tr>') { 
        while (fila.split('<td').length - 1 < 7) fila += '<td style="background:#e8e0c8"></td>'; 
        html += fila + '</tr>'; 
    }
    document.getElementById('calendarioBody').innerHTML = html;
}

function seleccionarDia(mes, dia) {
    diaSel = { mes: mes, dia: dia };
    document.getElementById('fechaSel').innerHTML = '📅 ' + dia + ' de ' + meses[mes] + ' 2026';
    var key = dia + '/' + (mes+1);
    document.getElementById('notaTexto').value = notas[key] || '';
}

function guardarNota() {
    if (!diaSel) { alert('Selecciona un día'); return; }
    var key = diaSel.dia + '/' + (diaSel.mes+1);
    var txt = document.getElementById('notaTexto').value;
    if (txt.trim()) notas[key] = txt.trim();
    else delete notas[key];
    localStorage.setItem('notas_' + usuarioActual.id, JSON.stringify(notas));
    generarCalendario(mesActual);
    mostrarToast('✅ Nota guardada');
}

function cargarNotas() {
    var s = localStorage.getItem('notas_' + usuarioActual.id);
    notas = s ? JSON.parse(s) : {};
}

function actualizarResumenLaboral() {
    var extras = 0, vac = 0, asu = 0;
    for (var k in notas) {
        var n = notas[k];
        // Saltar notas de cumpleaños
        if (esCumpleaños(n)) continue;
        var lower = n.toLowerCase();
        if (lower.indexOf('extra') !== -1) extras++;
        if (lower.indexOf('vacacion') !== -1) vac++;
        if (lower.indexOf('asunto') !== -1) asu++;
    }
    document.getElementById('totalExtras').innerText = extras;
    document.getElementById('totalVac').innerText = vac;
    document.getElementById('totalAsu').innerText = asu;
    var html = '<h4>📋 Notas laborales:</h4>';
    var hayLaborales = false;
    for (var k in notas) {
        var n = notas[k];
        if (esCumpleaños(n)) continue;
        hayLaborales = true;
        html += '<div style="padding:8px;background:#f8f9fa;margin:5px 0;border-radius:8px"><strong>📅 ' + k + '</strong><br>✏️ ' + n + '</div>';
    }
    if (!hayLaborales) html += '<p>Sin notas laborales</p>';
    document.getElementById('detalleNotas').innerHTML = html;
}

function actualizarResumenCumpleaños() {
    var cumples = 0;
    var html = '<h4>🎂 Lista de cumpleaños:</h4>';
    var hayCumples = false;
    for (var k in notas) {
        var n = notas[k];
        if (esCumpleaños(n)) {
            cumples++;
            hayCumples = true;
            html += '<div style="padding:8px;background:#ffe8e8;margin:5px 0;border-radius:8px;border-left:4px solid #c41e3a"><strong>🎂 ' + k + '</strong><br>✏️ ' + n + '</div>';
        }
    }
    document.getElementById('totalCumples').innerText = cumples;
    if (!hayCumples) html += '<p>No hay cumpleaños registrados. Escribe "cumpleaños" en cualquier nota.</p>';
    document.getElementById('detalleCumples').innerHTML = html;
}

function generarMeses() {
    var nav = document.getElementById('mesesNav');
    nav.innerHTML = '';
    for (var i = 0; i < meses.length; i++) {
        var btn = document.createElement('button');
        btn.className = 'mes-btn';
        if (i === 0) btn.classList.add('activo');
        btn.textContent = meses[i];
        btn.setAttribute('data-mes', i);
        btn.onclick = (function(idx) {
            return function() {
                var btns = document.querySelectorAll('.mes-btn');
                for (var j = 0; j < btns.length; j++) btns[j].classList.remove('activo');
                this.classList.add('activo');
                mesActual = idx;
                generarCalendario(idx);
                diaSel = null;
                document.getElementById('fechaSel').innerHTML = 'Haz clic en un día';
                document.getElementById('notaTexto').value = '';
            };
        })(i);
        nav.appendChild(btn);
    }
}

// ==================== LOGIN / REGISTRO ====================
function cargarUsuarios() {
    var s = localStorage.getItem('usuarios');
    usuarios = s ? JSON.parse(s) : [];
}

function guardarUsuarios() { localStorage.setItem('usuarios', JSON.stringify(usuarios)); }

function login() {
    var email = document.getElementById('loginEmail').value.trim();
    var pass = document.getElementById('loginPass').value;
    var err = document.getElementById('loginError');
    if (!email || !pass) { err.innerText = '❌ Completa todos los campos'; return; }
    var user = null;
    for (var i = 0; i < usuarios.length; i++) {
        if (usuarios[i].email === email && usuarios[i].pass === pass) {
            user = usuarios[i];
            break;
        }
    }
    if (user) {
        usuarioActual = user;
        document.getElementById('userNameDisplay').innerHTML = '👤 ' + user.nombre + ' - ' + user.depto;
        cargarNotas();
        document.getElementById('loginModal').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        mostrarNombresEspeciales();
        generarCalendario(0);
        actualizarResumenLaboral();
        actualizarResumenCumpleaños();
        cargarMensajes();
        actualizarChat();
        actualizarListaUsuarios();
        mostrarToast('✅ Bienvenido ' + user.nombre);
    } else {
        err.innerText = '❌ Email o contraseña incorrectos';
    }
}

function registrar() {
    var nom = document.getElementById('regNombre').value.trim();
    var email = document.getElementById('regEmail').value.trim();
    var depto = document.getElementById('regDepto').value.trim();
    var pass = document.getElementById('regPass').value;
    var err = document.getElementById('regError');
    if (!nom || !email || !depto || !pass) { err.innerText = '❌ Completa todos los campos'; return; }
    if (pass.length < 6) { err.innerText = '❌ Contraseña mínima 6 caracteres'; return; }
    var existe = false;
    for (var i = 0; i < usuarios.length; i++) {
        if (usuarios[i].email === email) { existe = true; break; }
    }
    if (existe) { err.innerText = '❌ Email ya registrado'; return; }
    var nuevo = { id: Date.now().toString(), nombre: nom, email: email, depto: depto, pass: pass };
    usuarios.push(nuevo);
    guardarUsuarios();
    usuarioActual = nuevo;
    document.getElementById('userNameDisplay').innerHTML = '👤 ' + nom + ' - ' + depto;
    document.getElementById('loginModal').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    mostrarNombresEspeciales();
    generarCalendario(0);
    mostrarToast('✅ Registrado ' + nom);
}

function logout() {
    usuarioActual = null;
    document.getElementById('app').style.display = 'none';
    document.getElementById('loginModal').style.display = 'flex';
}

// ==================== CHAT GENERAL ====================
function cargarMensajes() {
    var s = localStorage.getItem('chat_general');
    mensajes = s ? JSON.parse(s) : [];
}

function guardarMensajes() { localStorage.setItem('chat_general', JSON.stringify(mensajes)); }

function actualizarChat() {
    var cont = document.getElementById('chatMsgs');
    var html = '';
    for (var i = 0; i < mensajes.length; i++) {
        var m = mensajes[i];
        html += '<div class="msg ' + (m.uid === (usuarioActual ? usuarioActual.id : null) ? 'envio' : 'recibe') + '"><div class="bubble"><strong>' + m.emisor + '</strong><br>' + m.texto + '</div><div style="font-size:0.7rem">' + m.hora + '</div></div>';
    }
    cont.innerHTML = html;
    cont.scrollTop = cont.scrollHeight;
}

function enviarChat() {
    var inp = document.getElementById('chatInput');
    var txt = inp.value.trim();
    if (txt && usuarioActual) {
        mensajes.push({ id: Date.now(), emisor: usuarioActual.nombre, texto: txt, hora: new Date().toLocaleTimeString().slice(0,5), uid: usuarioActual.id });
        guardarMensajes();
        inp.value = '';
        actualizarChat();
    }
}

// ==================== CHATS PRIVADOS ====================
function actualizarListaUsuarios() {
    var cont = document.getElementById('usersList');
    var otros = [];
    for (var i = 0; i < usuarios.length; i++) {
        if (usuarios[i].id !== (usuarioActual ? usuarioActual.id : null)) otros.push(usuarios[i]);
    }
    if (otros.length === 0) { cont.innerHTML = '<p>No hay otros usuarios</p>'; return; }
    var html = '';
    for (var i = 0; i < otros.length; i++) {
        var u = otros[i];
        html += '<div class="user-item" onclick="abrirPrivado(\'' + u.id + '\',\'' + u.nombre + '\')"><div><strong>👤 ' + u.nombre + '</strong><br><small>' + u.depto + '</small></div><button style="width:auto;padding:5px 12px">💬</button></div>';
    }
    cont.innerHTML = html;
}

window.abrirPrivado = function(id, nom) {
    document.getElementById('chatCon').innerText = nom;
    document.getElementById('chatPrivadoPanel').style.display = 'block';
    var key = 'chat_' + usuarioActual.id + '_' + id;
    var s = localStorage.getItem(key);
    chatsPriv[id] = s ? JSON.parse(s) : [];
    actualizarPriv(id);
};

function actualizarPriv(id) {
    var cont = document.getElementById('privMsgs');
    var msgs = chatsPriv[id] || [];
    var html = '';
    for (var i = 0; i < msgs.length; i++) {
        var m = msgs[i];
        html += '<div class="msg ' + (m.uid === usuarioActual.id ? 'envio' : 'recibe') + '"><div class="bubble">' + m.texto + '</div><div style="font-size:0.7rem">' + m.hora + '</div></div>';
    }
    cont.innerHTML = html;
    cont.scrollTop = cont.scrollHeight;
}

function enviarPriv() {
    var inp = document.getElementById('privInput');
    var txt = inp.value.trim();
    var nom = document.getElementById('chatCon').innerText;
    var dest = null;
    for (var i = 0; i < usuarios.length; i++) {
        if (usuarios[i].nombre === nom) { dest = usuarios[i]; break; }
    }
    if (txt && usuarioActual && dest) {
        if (!chatsPriv[dest.id]) chatsPriv[dest.id] = [];
        chatsPriv[dest.id].push({ uid: usuarioActual.id, texto: txt, hora: new Date().toLocaleTimeString().slice(0,5) });
        localStorage.setItem('chat_' + usuarioActual.id + '_' + dest.id, JSON.stringify(chatsPriv[dest.id]));
        inp.value = '';
        actualizarPriv(dest.id);
    }
}

function mostrarToast(msg) {
    var t = document.createElement('div');
    t.className = 'toast';
    t.innerText = msg;
    document.body.appendChild(t);
    setTimeout(function() { t.remove(); }, 2000);
}

// ==================== EVENTOS ====================
document.getElementById('loginBtn').onclick = login;
document.getElementById('regBtn').onclick = registrar;
document.getElementById('showRegBtn').onclick = function() { document.getElementById('loginForm').style.display = 'none'; document.getElementById('registerForm').style.display = 'block'; };
document.getElementById('showLoginBtn').onclick = function() { document.getElementById('loginForm').style.display = 'block'; document.getElementById('registerForm').style.display = 'none'; };
document.getElementById('logoutBtn').onclick = logout;
document.getElementById('guardarNota').onclick = guardarNota;
document.getElementById('sendChat').onclick = enviarChat;
document.getElementById('sendPriv').onclick = enviarPriv;
document.getElementById('cerrarPriv').onclick = function() { document.getElementById('chatPrivadoPanel').style.display = 'none'; };
document.getElementById('chatInput').onkeypress = function(e) { if(e.key === 'Enter') enviarChat(); };
document.getElementById('privInput').onkeypress = function(e) { if(e.key === 'Enter') enviarPriv(); };

// Sub-tabs del resumen
var subTabs = document.querySelectorAll('.sub-tab');
for (var i = 0; i < subTabs.length; i++) {
    subTabs[i].onclick = function(btn) {
        return function() {
            var subId = btn.getAttribute('data-sub');
            var allSubTabs = document.querySelectorAll('.sub-tab');
            for (var j = 0; j < allSubTabs.length; j++) allSubTabs[j].classList.remove('active');
            btn.classList.add('active');
            document.getElementById('sub-laboral').style.display = 'none';
            document.getElementById('sub-cumpleaños').style.display = 'none';
            document.getElementById('sub-' + subId).style.display = 'block';
            if (subId === 'laboral') actualizarResumenLaboral();
            if (subId === 'cumpleaños') actualizarResumenCumpleaños();
        };
    }(subTabs[i]);
}

var tabs = document.querySelectorAll('.tab');
for (var i = 0; i < tabs.length; i++) {
    tabs[i].onclick = (function(btn) {
        return function() {
            var id = btn.getAttribute('data-tab');
            var allTabs = document.querySelectorAll('.tab');
            for (var j = 0; j < allTabs.length; j++) allTabs[j].classList.remove('active');
            btn.classList.add('active');
            var allPanels = document.querySelectorAll('.panel');
            for (var j = 0; j < allPanels.length; j++) allPanels[j].classList.remove('active');
            document.getElementById('panel-' + id).classList.add('active');
            if(id === 'resumen') {
                actualizarResumenLaboral();
                actualizarResumenCumpleaños();
            }
            if(id === 'chat') actualizarChat();
            if(id === 'privados') actualizarListaUsuarios();
        };
    })(tabs[i]);
}

cargarUsuarios();
cargarMensajes();
generarMeses();
window.seleccionarDia = seleccionarDia;
window.togglePassword = togglePassword;
</script>
</body>
